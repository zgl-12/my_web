<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>D3 多维数据动态直方图</title>
<style>
body {
    background-color: #2b2b2b;
    margin: 0;
}
</style>
</head>
<body>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
    var width=(window.innerWidth||document.documentElement.clientWidth||document.body.clientHeight)*0.96;
    var height=(window.innerHeight||document.documentElement.clientHeight||document.body.clientHeight)*0.9;	

    // 多维数据集
	const data = [
		{year: 2020,  entities: [{name:"甲", value: 88}, {name:"乙", value: 65}, {name:"丙", value: 92}, {name:"丁", value: 43} , {name:"戊", value: 27}]},
		{year: 2021,  entities: [{name:"甲", value: 95}, {name:"乙", value: 72}, {name:"丙", value: 81}, {name:"丁", value: 51}, {name:"戊", value: 33}]},
		{year: 2022,  entities: [{name:"甲", value: 79}, {name:"乙", value: 86}, {name:"丙", value: 74}, {name:"丁", value: 48}, {name:"戊", value: 56}]},
		{year: 2023,  entities: [{name:"甲", value: 91}, {name:"乙", value: 77}, {name:"丙", value: 85}, {name:"丁", value: 62}, {name:"戊", value: 41}]},
		{year: 2024,  entities: [{name:"甲", value: 84}, {name:"乙", value: 90}, {name:"丙", value: 78}, {name:"丁", value: 55}, {name:"戊", value: 68}]},
		{year: 2025,  entities: [{name:"甲", value: 76}, {name:"乙", value: 82}, {name:"丙", value: 94}, {name:"丁", value: 49}, {name:"戊", value: 73}]}
	];
	
	const rect = {height: 40};
    
    var svg = d3.select("body")			
				.append("svg")			
				.attr("width",width)	
				.attr("height",height)
                .style("background-color", "#383838");
                  
	var scale = d3.scaleLinear()
                    .domain([0, 120])
                    .range([70, width*0.9]);
       
	var index = 0;
	var dataEntry = data[index];
	var dataValue = dataEntry["entities"].sort((x, y) => y.value - x.value);

	const maxHeight = (rect.height) * (dataValue.length)
	var comment = svg.append("text")
                     .attr("x", width*0.8)
                     .attr("y", maxHeight)
					 .attr("fill", "#cccccc")
                     .attr("font-size", "40")
                     .text(dataEntry.year);
    

    var color=d3.schemeSet2; 
	var rects= svg.selectAll("rect")
                    .data(dataValue)
                    .enter()
                    .append("rect")
					.attr("x", 40)
					.attr("height", rect.height)
					.attr("fill", (d,i)=>color[i%10]);


    var nameTexts = svg.selectAll(".name-text")
        .data(dataValue)
        .enter()
        .append("text")
        .attr("class", "name-text")
        .attr("x", 10)
        .attr("text-anchor", "end")
        .attr("dominant-baseline", "middle") // 垂直居中对齐
        .attr("fill", "#ffffff")
        .attr("font-size", "16px")
        .text(d => d.name);

 
    var valueTexts = svg.selectAll(".value-text")
        .data(dataValue)
        .enter()
        .append("text")
        .attr("class", "value-text")
        .attr("text-anchor", "start")
        .attr("dominant-baseline", "middle") // 垂直居中对齐
        .attr("fill", "#ffffff")
        .attr("font-size", "16px")
        .text(d => d.value);

    svg.append("g")
           .attr("transform", `translate(0, ${maxHeight + rect.height})`);
	
	function updateElements(){
		rects.data(dataValue, d=>d.name)
             .transition()
             .duration(900)
             .ease(d3.easeBounce)
			 .attr("y", (_, i) => rect.height*i)
			 .attr("width", d => scale(d.value))


        nameTexts.data(dataValue, d=>d.name)
            .transition()
            .duration(900)
            .ease(d3.easeBounce)
            .attr("y", (_, i) => rect.height * i + rect.height / 2); // 关键修复

  
        valueTexts.data(dataValue, d=>d.name)
            .transition()
            .duration(900)
            .ease(d3.easeBounce)
            .attr("x", d => scale(d.value)+5)
            .attr("y", (_, i) => rect.height * i + rect.height / 2) // 关键修复
            .text(d => d.value);
	}
	
	updateElements()
	
	function update(i){	
		dataEntry = data[i];
		dataValue = dataEntry["entities"].sort((x, y) => y.value - x.value);
	    comment.text(dataEntry.year);
	    updateElements()
	}
	

	setInterval(()=> update((++index) % data.length), 1000);
</script>
</body>
</html>
